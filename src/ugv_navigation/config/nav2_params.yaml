# =============================================================================
# Nav2 Parameters Skeleton for UGV Beast
# =============================================================================
#
# This is a starting-point config. All hardware-dependent values are marked TODO.
# See: https://docs.nav2.org/configuration/
# =============================================================================

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    # TODO: point to custom behavior tree XML if needed
    # default_bt_xml_filename: ''

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    # TODO: tune velocity limits for UGV Beast
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      max_vel_x: 0.5          # TODO: measure max safe speed
      min_vel_y: 0.0
      max_vel_y: 0.0           # differential drive — no lateral motion
      max_vel_theta: 1.0       # TODO: tune max rotation speed
      min_speed_xy: 0.0
      max_speed_xy: 0.5
      min_speed_theta: 0.0
      acc_lim_x: 2.5           # TODO: tune acceleration limits
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -2.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2

planner_server:
  ros__parameters:
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3                 # TODO: tune for site scale
      height: 3
      resolution: 0.05
      # TODO: add obstacle layer from camera/lidar when available
      plugins: ["voxel_layer", "inflation_layer"]

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # TODO: set static map from SLAM
      # static_map: true
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

amcl:
  ros__parameters:
    # TODO: tune particle filter for UGV Beast
    min_particles: 500
    max_particles: 2000
    alpha1: 0.2                # rotation noise from rotation
    alpha2: 0.2                # rotation noise from translation
    alpha3: 0.2                # translation noise from translation
    alpha4: 0.2                # translation noise from rotation
    base_frame_id: base_link
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: /scan          # TODO: update if using camera-based costmap instead of lidar
